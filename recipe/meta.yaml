{% set name = "pgsanity" %}
{% set version = "0.3.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pgsanity-{{ version }}.tar.gz
  sha256: 3e8fc33d0a64e78c3581638bf5a02b37a23c76631beee458c6e44c23a3080ca5

build:
  number: 0
  noarch: python
  entry_points:
    - pgsanity = pgsanity.pgsanity:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - pgsanity
  commands:
    - pip check
    - pgsanity --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/markdrago/pgsanity
  summary: Check syntax of sql for PostgreSQL
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mariusvniekerk
